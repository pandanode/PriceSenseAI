services:
  - type: web
    name: pricesenseai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend/app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        value: 8bnn6q.h.filess.io
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: pricesenseai_filmwithwe
      - key: DB_NAME
        value: pricesenseai_filmwithwe